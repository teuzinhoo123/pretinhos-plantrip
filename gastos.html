<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pretinhos Eurotrip | Gastos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* Mesmas bases de CSS dos anteriores para manter coesão */
        body { font-family: 'Inter', sans-serif; background-color: #f4f7fb; color: #0f172a; }
        .bento-card { background: white; border-radius: 28px; padding: 2rem; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.04); border: 1px solid rgba(255,255,255,0.8); }
        .nav-pill { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; padding: 10px 16px; border-radius: 100px; transition: all 0.2s; white-space: nowrap; }
        .nav-active { color: #4f46e5 !important; background: #eef2ff !important; }
        .input-bento { background-color: #f8fafc; border: 1px solid transparent; border-radius: 16px; padding: 14px 16px; font-weight: 600; color: #1e293b; width: 100%; outline: none; }
        .visual-selector { border: 2px solid transparent; background: #f8fafc; border-radius: 16px; padding: 12px; cursor: pointer; transition: all 0.2s; text-align: center; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .visual-selector.selected { border-color: #4f46e5; background: #eef2ff; color: #4f46e5; }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="antialiased">
    <div id="app" v-cloak>
        <div class="max-w-6xl mx-auto p-4 md:p-8">
            <header class="flex flex-col md:flex-row justify-between items-center gap-6 mb-10">
                <div class="flex items-center gap-4"><h1 class="text-xl md:text-2xl font-black tracking-tighter italic text-indigo-600">Gastos Gerais</h1></div>
                <nav class="flex gap-1 overflow-x-auto no-scrollbar w-full md:w-auto">
                    <a href="index.html" class="nav-pill">Home</a>
                    <a href="roteiro.html" class="nav-pill">Roteiro</a>
                    <a href="transporte.html" class="nav-pill">Transporte</a>
                    <a href="hospedagem.html" class="nav-pill">Hospedagem</a>
                    <a href="checklist.html" class="nav-pill">Checklist</a>
                    <a href="gastos.html" class="nav-pill nav-active">Gastos</a>
                </nav>
            </header>

            <div class="flex justify-between items-center mb-8">
                <div class="flex gap-4">
                    <div class="bento-card !py-3 !px-6 bg-indigo-600 text-white"><p class="text-[8px] uppercase font-black opacity-60">Total</p><p class="font-black">R$ {{ totalGeralReal.toLocaleString() }}</p></div>
                    <div class="bento-card !py-3 !px-6"><p class="text-[8px] uppercase font-black text-slate-400">Wise OK</p><p class="font-black text-emerald-500">R$ {{ totalPagoReal.toLocaleString() }}</p></div>
                </div>
                <button @click="abrirModal()" class="bg-indigo-600 text-white text-xs px-8 py-4 rounded-2xl font-black uppercase">+ Novo</button>
            </div>

            <div class="space-y-4">
                <div v-for="g in gastos" :key="g.id" class="bento-card !p-5 flex justify-between items-center" :class="g.status === 'Pago' ? 'border-l-4 border-emerald-500' : 'opacity-70'">
                    <div><span class="text-[8px] font-black uppercase bg-slate-100 text-slate-400 px-2 py-1 rounded">{{ g.categoria }}</span><h3 class="font-black text-slate-800 uppercase tracking-tighter mt-1">{{ g.descricao }}</h3></div>
                    <div class="text-right"><p class="font-black text-lg">R$ {{ Number(g.valorBrl).toLocaleString() }}</p><button @click="abrirModal(g)" class="text-[10px] font-black uppercase text-indigo-600">Editar</button></div>
                </div>
            </div>
        </div>

        <div v-if="showModal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
            <div class="bento-card w-full max-w-2xl flex flex-col max-h-[90vh]">
                <div class="flex justify-between items-center mb-6 shrink-0"><h2 class="text-xl font-black text-slate-800 uppercase tracking-widest">Gasto</h2><button @click="showModal = false" class="p-2 bg-slate-100 rounded-full">✕</button></div>
                <div class="overflow-y-auto pr-2 space-y-6 flex-grow no-scrollbar">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                        <div v-for="cat in ['Comida', 'Lazer', 'Compras', 'Documentos', 'Taxas']" :key="cat" @click="form.categoria = cat" :class="form.categoria === cat ? 'selected' : ''" class="visual-selector">{{ cat }}</div>
                    </div>
                    <input v-model="form.descricao" placeholder="O que você comprou?" class="input-bento">
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[10px] font-bold text-slate-400 block mb-1">R$</label><input v-model.number="form.valorBrl" type="number" @input="calcEuro" class="input-bento"></div>
                        <div><label class="text-[10px] font-bold text-slate-400 block mb-1">€</label><input v-model.number="form.valorEur" type="number" @input="calcReal" class="input-bento"></div>
                    </div>
                    <div class="bg-slate-900 p-6 rounded-3xl"><label class="text-[10px] font-bold text-slate-500 uppercase block mb-3">Status de Pagamento</label>
                        <div class="grid grid-cols-2 gap-3">
                            <div @click="form.status = 'Planejado'" :class="form.status === 'Planejado' ? 'selected !bg-white/10 !text-white' : 'text-slate-500'" class="visual-selector">Planejado</div>
                            <div @click="form.status = 'Pago'" :class="form.status === 'Pago' ? 'selected !bg-emerald-500 !text-white' : 'text-slate-500'" class="visual-selector">Pago</div>
                        </div>
                    </div>
                </div>
                <div class="pt-6 border-t mt-4 shrink-0"><button @click="salvar" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-600 transition">Salvar</button></div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() { return { gastos: [], config: { cambio: 6.10 }, showModal: false, isEditing: false, form: {} } },
            computed: {
                totalGeralReal() { return this.gastos.reduce((acc, g) => acc + (Number(g.valorBrl) || 0), 0); },
                totalPagoReal() { return this.gastos.filter(g => g.status === 'Pago').reduce((acc, g) => acc + (Number(g.valorBrl) || 0), 0); }
            },
            methods: {
                calcEuro() { this.form.valorEur = (this.form.valorBrl / this.config.cambio).toFixed(2); },
                calcReal() { this.form.valorBrl = (this.form.valorEur * this.config.cambio).toFixed(2); },
                abrirModal(item = null) {
                    if (item) { this.isEditing = true; this.form = { ...item }; }
                    else { this.isEditing = false; this.form = { id: Date.now(), categoria: 'Comida', descricao: '', valorBrl: 0, valorEur: 0, status: 'Planejado' }; }
                    this.showModal = true;
                },
                salvar() {
                    const s = JSON.parse(localStorage.getItem('euro_data_master_v4') || '{}');
                    if (this.isEditing) { const idx = this.gastos.findIndex(x => x.id === this.form.id); this.gastos[idx] = { ...this.form }; }
                    else { this.gastos.push({ ...this.form }); }
                    s.gastos = this.gastos; localStorage.setItem('euro_data_master_v4', JSON.stringify(s));
                    this.showModal = false;
                },
                deletar(id) { if(confirm('Apagar?')) { this.gastos = this.gastos.filter(x => x.id !== id); this.salvar(); } },
                carregar() { const s = localStorage.getItem('euro_data_master_v4'); if (s) { const p = JSON.parse(s); this.gastos = p.gastos || []; this.config = p.config || { cambio: 6.10 }; } }
            },
            mounted() { this.carregar(); }
        }).mount('#app')
    </script>
</body>
</html>
