<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pretinhos Eurotrip | Transporte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7fb; color: #0f172a; }
        .bento-card { background: white; border-radius: 28px; padding: 2rem; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.04); border: 1px solid rgba(255,255,255,0.8); }
        .nav-pill { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; padding: 10px 16px; border-radius: 100px; transition: all 0.2s; white-space: nowrap; }
        .nav-active { color: #4f46e5 !important; background: #eef2ff !important; }
        .input-bento { background-color: #f8fafc; border: 1px solid transparent; border-radius: 16px; padding: 14px 16px; font-weight: 600; color: #1e293b; width: 100%; outline: none; transition: all 0.2s; }
        .visual-selector { border: 2px solid transparent; background: #f8fafc; border-radius: 16px; padding: 16px; cursor: pointer; transition: all 0.2s; text-align: center; }
        .visual-selector.selected { border-color: #4f46e5; background: #eef2ff; color: #4f46e5; }
        [v-cloak] { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased">
    <div id="app" v-cloak>
        <div class="max-w-6xl mx-auto p-4 md:p-8">
            <header class="flex flex-col md:flex-row justify-between items-center gap-6 mb-10">
                <div class="flex items-center gap-4"><h1 class="text-xl md:text-2xl font-black tracking-tighter italic text-indigo-600">Transporte</h1></div>
                <nav class="flex gap-1 overflow-x-auto no-scrollbar w-full md:w-auto">
                    <a href="index.html" class="nav-pill">Home</a>
                    <a href="roteiro.html" class="nav-pill">Roteiro</a>
                    <a href="transporte.html" class="nav-pill nav-active">Transporte</a>
                    <a href="hospedagem.html" class="nav-pill">Hospedagem</a>
                    <a href="checklist.html" class="nav-pill">Checklist</a>
                    <a href="gastos.html" class="nav-pill">Gastos</a>
                </nav>
            </header>

            <button @click="abrirModal()" class="bg-indigo-600 text-white text-xs px-8 py-4 rounded-2xl font-black uppercase mb-8 shadow-xl">+ Novo Transporte</button>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div v-for="t in transportes" :key="t.id" class="bento-card">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-black uppercase bg-indigo-50 text-indigo-600 px-2 py-1 rounded">{{ t.tipo }}</span>
                        <button @click="deletar(t.id)" class="text-slate-300 hover:text-red-500">✕</button>
                    </div>
                    <h3 class="text-lg font-black uppercase tracking-tighter">{{ t.origemTxt }} ➔ {{ t.destinoTxt }}</h3>
                    <div class="mt-4 flex justify-between items-end border-t border-slate-50 pt-4">
                        <div><p class="text-[9px] font-bold text-slate-400 uppercase">Valor</p><p class="text-lg font-black">R$ {{ Number(t.valorBrl).toLocaleString() }}</p></div>
                        <button @click="abrirModal(t)" class="text-[10px] font-black uppercase text-indigo-600 underline">Editar</button>
                    </div>
                </div>
            </div>
        </div>

        <div v-if="showModal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
            <div class="bento-card w-full max-w-3xl flex flex-col max-h-[90vh]">
                <div class="flex justify-between items-center mb-6 shrink-0"><h2 class="text-xl font-black text-slate-800 uppercase tracking-widest">Transporte</h2><button @click="showModal = false" class="p-2 bg-slate-100 rounded-full">✕</button></div>
                
                <div class="overflow-y-auto pr-2 space-y-6 flex-grow no-scrollbar">
                    <div class="grid grid-cols-3 gap-2">
                        <div v-for="tipo in ['Avião', 'Trem', 'Ônibus']" :key="tipo" @click="form.tipo = tipo" :class="form.tipo === tipo ? 'selected' : ''" class="visual-selector font-black text-[10px] uppercase">{{ tipo }}</div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input v-model="form.origemTxt" placeholder="De onde?" class="input-bento">
                        <input v-model="form.destinoTxt" placeholder="Para onde?" class="input-bento">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="text-[10px] font-bold text-slate-400 block mb-1">Valor em Real (R$)</label><input v-model.number="form.valorBrl" type="number" @input="calcEuro" class="input-bento" placeholder="0,00"></div>
                        <div><label class="text-[10px] font-bold text-slate-400 block mb-1">Valor em Euro (€)</label><input v-model.number="form.valorEur" type="number" @input="calcReal" class="input-bento" placeholder="0,00"></div>
                    </div>
                    <div class="bg-indigo-50 p-4 rounded-3xl"><label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" v-model="form.comprado" class="w-6 h-6 accent-indigo-600 rounded-lg"><span class="text-xs font-black text-indigo-900 uppercase">Confirmar Reserva</span></label></div>
                </div>

                <div class="pt-6 border-t mt-4 shrink-0"><button @click="salvar" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-600 transition">Salvar</button></div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() { return { transportes: [], config: { cambio: 6.10 }, showModal: false, isEditing: false, form: {} } },
            methods: {
                calcEuro() { this.form.valorEur = (this.form.valorBrl / this.config.cambio).toFixed(2); },
                calcReal() { this.form.valorBrl = (this.form.valorEur * this.config.cambio).toFixed(2); },
                abrirModal(item = null) {
                    if (item) { this.isEditing = true; this.form = { ...item }; }
                    else { this.isEditing = false; this.form = { id: Date.now(), tipo: 'Avião', origemTxt: '', destinoTxt: '', valorBrl: 0, valorEur: 0, comprado: false }; }
                    this.showModal = true;
                },
                salvar() {
                    const s = JSON.parse(localStorage.getItem('euro_data_master_v4') || '{}');
                    if (this.isEditing) { const idx = this.transportes.findIndex(x => x.id === this.form.id); this.transportes[idx] = { ...this.form }; }
                    else { this.transportes.push({ ...this.form }); }
                    s.transportes = this.transportes; localStorage.setItem('euro_data_master_v4', JSON.stringify(s));
                    this.showModal = false;
                },
                deletar(id) { if(confirm('Apagar?')) { this.transportes = this.transportes.filter(x => x.id !== id); this.salvar(); } },
                carregar() { const s = localStorage.getItem('euro_data_master_v4'); if (s) { const p = JSON.parse(s); this.transportes = p.transportes || []; this.config = p.config || { cambio: 6.10 }; } }
            },
            mounted() { this.carregar(); }
        }).mount('#app')
    </script>
</body>
</html>
